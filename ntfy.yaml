apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntfy
  namespace: argocd
spec:
  project: local
  source:
    repoURL: https://github.com/nazmang/argocd-apps.git
    targetRevision: main
    path: helm-ntfy
    helm:
      releaseName: ntfy
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ntfy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  info:
    - name: upstream
      value: "https://ntfy.sh"
    - name: dockerhub
      value: "https://hub.docker.com/r/binwiederhier/ntfy"
